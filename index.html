<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TURBO RACERS</title>
<style>
@font-face { font-family: 'LedLight'; src: url('LEDLIGHT.otf') format('opentype'); }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', sans-serif; color: #fff; overflow: hidden; }
canvas { border: none; }
#ui {
  position: absolute; top: 12px; left: 12px;
  background: linear-gradient(135deg, rgba(0,0,0,0.85), rgba(20,20,30,0.8));
  padding: 14px 16px; border-radius: 10px; font-size: 13px; min-width: 190px; display: none;
  border: 1px solid rgba(255,215,0,0.15);
  backdrop-filter: blur(4px);
}
#ui h3 { margin-bottom: 10px; font-size: 13px; color: #ffd700; letter-spacing: 3px; text-transform: uppercase; font-weight: 600; border-bottom: 1px solid rgba(255,215,0,0.2); padding-bottom: 6px; }
.pos-entry { display: flex; align-items: center; gap: 8px; margin: 4px 0; padding: 3px 4px; border-radius: 4px; transition: background 0.2s; }
.pos-entry:first-child { background: rgba(255,215,0,0.1); }
.color-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; box-shadow: 0 0 4px currentColor; }
#lap-info {
  position: absolute; top: 12px; right: 12px;
  background: linear-gradient(135deg, rgba(0,0,0,0.85), rgba(20,20,30,0.8));
  padding: 10px 16px; border-radius: 10px; font-size: 14px; display: none;
  border: 1px solid rgba(255,215,0,0.15);
  backdrop-filter: blur(4px); text-align: center;
}
#countdown { position: absolute; font-size: 120px; font-weight: bold; color: #ffd700; text-shadow: 0 0 40px rgba(255,215,0,0.6), 0 0 80px rgba(255,215,0,0.3); z-index: 5; display: none; }
#finish-screen {
  position: absolute; display: none; flex-direction: column; align-items: center; gap: 20px;
  background: linear-gradient(135deg, rgba(0,0,0,0.92), rgba(15,15,25,0.9));
  padding: 50px 60px; border-radius: 20px; z-index: 10;
  border: 1px solid rgba(255,215,0,0.2);
  backdrop-filter: blur(8px);
}
#finish-screen h2 { font-size: 42px; color: #ffd700; font-family: 'LedLight', sans-serif; letter-spacing: 4px; text-shadow: 0 0 20px rgba(255,215,0,0.4); }
#finish-results { font-size: 16px; line-height: 2.2; }
button {
  background: linear-gradient(135deg, #ffd700, #ffb800); color: #111; border: none;
  padding: 14px 40px; font-size: 18px; font-weight: bold; border-radius: 8px;
  cursor: pointer; transition: transform 0.1s, box-shadow 0.2s;
  box-shadow: 0 4px 15px rgba(255,215,0,0.3);
  letter-spacing: 1px;
}
button:hover { transform: scale(1.05); box-shadow: 0 6px 25px rgba(255,215,0,0.5); }

/* ---- Main Menu ---- */
#main-menu {
  position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; z-index: 10;
}
#main-menu h1 {
  font-size: 72px; color: #ffd700; text-shadow: 0 0 30px rgba(255,215,0,0.5), 0 4px 12px rgba(0,0,0,0.8);
  letter-spacing: 8px; font-family: 'LedLight', sans-serif;
}
#main-menu p.subtitle {
  color: #888; font-size: 15px; margin-top: -12px; letter-spacing: 3px; text-transform: uppercase;
}
.menu-btn {
  width: 280px; text-align: center; padding: 16px 0; font-size: 22px; letter-spacing: 2px;
}
.menu-btn.secondary {
  background: #333; color: #888; border: 2px solid #555;
}
.menu-btn.secondary:hover { background: #444; transform: scale(1.02); }
.coming-soon-tooltip {
  color: #ff6644; font-size: 13px; margin-top: -16px; display: none;
}

/* ---- Setup Screen ---- */
#setup-screen {
  position: absolute; display: none; flex-direction: column; align-items: center; gap: 20px; z-index: 10;
  background: rgba(10,10,10,0.95); padding: 40px 48px; border-radius: 16px; border: 1px solid #333;
  max-height: 90vh; overflow-y: auto;
}
#setup-screen h2 {
  font-size: 32px; color: #ffd700; letter-spacing: 4px; margin-bottom: 4px;
}
.setup-section {
  width: 100%; text-align: center;
}
.setup-section label {
  display: block; color: #aaa; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px;
}
.track-length-btns {
  display: flex; gap: 10px; justify-content: center;
}
.track-length-btns button {
  padding: 10px 24px; font-size: 16px; background: #222; color: #ccc; border: 2px solid #444; border-radius: 6px;
  cursor: pointer; transition: all 0.15s;
}
.track-length-btns button:hover { border-color: #ffd700; color: #fff; }
.track-length-btns button.selected {
  background: #ffd700; color: #111; border-color: #ffd700; transform: scale(1.05);
}

.car-picker {
  display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
}
.car-thumb {
  width: 64px; height: 64px; border: 3px solid #333; border-radius: 10px; cursor: pointer;
  background: #1a1a1a; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; position: relative; overflow: hidden;
}
.car-thumb img {
  max-width: 48px; max-height: 48px; object-fit: contain; image-rendering: pixelated;
}
.car-thumb:hover { border-color: #888; }
.car-thumb.selected { border-color: #ffd700; box-shadow: 0 0 12px rgba(255,215,0,0.5); background: #2a2500; }
.car-thumb .color-label {
  position: absolute; bottom: 2px; font-size: 9px; color: #888; text-transform: uppercase;
}

.username-input {
  background: #1a1a1a; border: 2px solid #444; border-radius: 6px; color: #fff; padding: 10px 16px;
  font-size: 18px; text-align: center; width: 240px; outline: none; font-family: inherit;
}
.username-input:focus { border-color: #ffd700; }
.username-input::placeholder { color: #555; }

#start-race-btn {
  margin-top: 8px; padding: 16px 56px; font-size: 24px; letter-spacing: 3px;
}
#back-to-menu-btn {
  background: transparent; color: #666; font-size: 14px; padding: 8px 16px; margin-top: -8px;
}
#back-to-menu-btn:hover { color: #aaa; }

/* ---- Multiplayer Lobby ---- */
#mp-lobby {
  position: absolute; display: none; flex-direction: column; align-items: center; gap: 16px; z-index: 10;
  background: rgba(10,10,10,0.95); padding: 32px 40px; border-radius: 16px; border: 1px solid #333;
  max-height: 90vh; overflow-y: auto; min-width: 380px;
}
#mp-lobby h2 { font-size: 28px; color: #ffd700; letter-spacing: 4px; margin-bottom: 0; }
.mp-tabs { display: flex; gap: 0; width: 100%; }
.mp-tab {
  flex: 1; text-align: center; padding: 10px 0; font-size: 15px; font-weight: bold; letter-spacing: 2px;
  background: #1a1a1a; color: #666; border: 2px solid #333; cursor: pointer; transition: all 0.15s;
}
.mp-tab:first-child { border-radius: 6px 0 0 6px; }
.mp-tab:last-child { border-radius: 0 6px 6px 0; }
.mp-tab.active { background: #2a2500; color: #ffd700; border-color: #ffd700; }
.mp-tab:hover:not(.active) { color: #aaa; }
.mp-panel { display: none; width: 100%; flex-direction: column; align-items: center; gap: 14px; }
.mp-panel.active { display: flex; }
.mp-field { width: 100%; text-align: center; }
.mp-field label { display: block; color: #aaa; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; }
.mp-input {
  background: #1a1a1a; border: 2px solid #444; border-radius: 6px; color: #fff; padding: 10px 16px;
  font-size: 18px; text-align: center; width: 200px; outline: none; font-family: inherit;
}
.mp-input:focus { border-color: #ffd700; }
.mp-input::placeholder { color: #555; }
.mp-code-input { width: 140px; font-size: 28px; letter-spacing: 8px; text-transform: uppercase; font-weight: bold; }
.mp-room-code { font-size: 48px; color: #ffd700; font-weight: 900; letter-spacing: 12px; text-shadow: 0 0 20px rgba(255,215,0,0.4); margin: 8px 0; }
.mp-room-label { color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; }
.mp-player-list { width: 100%; max-width: 300px; }
.mp-player-entry {
  display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 6px; margin: 2px 0;
  background: rgba(255,255,255,0.03);
}
.mp-player-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.mp-player-name { color: #ccc; font-size: 15px; }
.mp-player-tag { color: #ffd700; font-size: 11px; font-weight: bold; margin-left: 4px; }
.mp-btn { padding: 12px 36px; font-size: 18px; letter-spacing: 2px; }
.mp-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.mp-btn.start-race { background: #44cc44; color: #111; }
.mp-btn.start-race:hover:not(:disabled) { background: #55dd55; }
.mp-back-btn { background: transparent; color: #666; font-size: 14px; padding: 8px 16px; }
.mp-back-btn:hover { color: #aaa; }
.mp-error { color: #ff4444; font-size: 13px; min-height: 18px; }
.mp-status { color: #888; font-size: 13px; }
.mp-color-picker { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.mp-color-opt {
  width: 36px; height: 36px; border-radius: 50%; border: 3px solid #333; cursor: pointer; transition: all 0.15s;
}
.mp-color-opt:hover { border-color: #888; transform: scale(1.1); }
.mp-color-opt.selected { border-color: #ffd700; box-shadow: 0 0 10px rgba(255,215,0,0.5); }
.mp-track-btns { display: flex; gap: 8px; justify-content: center; }
.mp-track-btns button {
  padding: 8px 18px; font-size: 14px; background: #222; color: #ccc; border: 2px solid #444; border-radius: 6px;
  cursor: pointer; transition: all 0.15s;
}
.mp-track-btns button:hover { border-color: #ffd700; color: #fff; }
.mp-track-btns button.selected { background: #ffd700; color: #111; border-color: #ffd700; }
#mp-countdown-overlay {
  position: absolute; font-size: 120px; font-weight: bold; color: #ffd700;
  text-shadow: 0 0 40px rgba(255,215,0,0.6); z-index: 15; display: none;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui"><h3>Positions</h3><div id="positions"></div></div>
<div id="lap-info">Lap <span id="lap-current">0</span> / <span id="lap-total">3</span></div>

<!-- Main Menu -->
<div id="main-menu">
  <h1>TURBO RACERS</h1>
  <p class="subtitle">High speed thrills</p>
  <button class="menu-btn" onclick="showSetup()">SINGLE PLAYER</button>
  <button class="menu-btn secondary" onclick="showMultiplayerLobby()">MULTIPLAYER</button>
  <p class="coming-soon-tooltip" id="coming-soon-msg">COMING SOON</p>
  <p style="color:#555;font-size:12px;margin-top:8px">Arrow keys or WASD to drive</p>
</div>

<!-- Single Player Setup -->
<div id="setup-screen">
  <h2>RACE SETUP</h2>

  <div class="setup-section">
    <label>Track Length</label>
    <div class="track-length-btns">
      <button onclick="selectTrackLength('short', this)" data-track="short">SHORT</button>
      <button onclick="selectTrackLength('medium', this)" data-track="medium" class="selected">MEDIUM</button>
      <button onclick="selectTrackLength('long', this)" data-track="long">LONG</button>
    </div>
  </div>

  <div class="setup-section">
    <label>Choose Your Car</label>
    <div class="car-picker" id="car-picker"></div>
  </div>

  <div class="setup-section">
    <label>Driver Name</label>
    <input type="text" class="username-input" id="username-input" maxlength="12" placeholder="Player" value="Player">
  </div>

  <button id="start-race-btn" onclick="startRaceFromSetup()">START RACE</button>
  <button id="back-to-menu-btn" onclick="showMainMenu()">BACK</button>
</div>

<!-- Multiplayer Lobby -->
<div id="mp-lobby">
  <h2>MULTIPLAYER</h2>
  <div class="mp-tabs">
    <div class="mp-tab active" onclick="mpSwitchTab('create')">CREATE ROOM</div>
    <div class="mp-tab" onclick="mpSwitchTab('join')">JOIN ROOM</div>
  </div>
  <div class="mp-error" id="mp-error"></div>

  <!-- Create Room Panel -->
  <div class="mp-panel active" id="mp-create-panel">
    <div class="mp-field">
      <label>Driver Name</label>
      <input type="text" class="mp-input" id="mp-create-name" maxlength="12" placeholder="Player" value="Player">
    </div>
    <div class="mp-field">
      <label>Car Color</label>
      <div class="mp-color-picker" id="mp-create-colors"></div>
    </div>
    <div class="mp-field">
      <label>Track Length</label>
      <div class="mp-track-btns" id="mp-track-btns">
        <button onclick="mpSelectTrack('short',this)">SHORT</button>
        <button class="selected" onclick="mpSelectTrack('medium',this)">MEDIUM</button>
        <button onclick="mpSelectTrack('long',this)">LONG</button>
      </div>
    </div>
    <button class="mp-btn" id="mp-create-btn" onclick="mpCreateRoom()">CREATE</button>
  </div>

  <!-- Join Room Panel -->
  <div class="mp-panel" id="mp-join-panel">
    <div class="mp-field">
      <label>Driver Name</label>
      <input type="text" class="mp-input" id="mp-join-name" maxlength="12" placeholder="Player" value="Player">
    </div>
    <div class="mp-field">
      <label>Car Color</label>
      <div class="mp-color-picker" id="mp-join-colors"></div>
    </div>
    <div class="mp-field">
      <label>Room Code</label>
      <input type="text" class="mp-input mp-code-input" id="mp-join-code" maxlength="4" placeholder="ABCD">
    </div>
    <button class="mp-btn" id="mp-join-btn" onclick="mpJoinRoom()">JOIN</button>
  </div>

  <!-- Waiting Room (shown after create/join) -->
  <div class="mp-panel" id="mp-waiting-panel">
    <div class="mp-room-label">ROOM CODE</div>
    <div class="mp-room-code" id="mp-room-code-display"></div>
    <div class="mp-player-list" id="mp-player-list"></div>
    <div class="mp-status" id="mp-waiting-status">Waiting for players...</div>
    <button class="mp-btn start-race" id="mp-start-btn" onclick="mpStartGame()" style="display:none" disabled>START RACE</button>
  </div>

  <button class="mp-back-btn" onclick="mpGoBack()">BACK</button>
</div>

<div id="mp-countdown-overlay"></div>
<div id="countdown"></div>
<div id="finish-screen">
  <h2>RACE FINISHED!</h2>
  <div id="finish-results"></div>
  <button onclick="resetRace()">NEW RACE</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const TOTAL_LAPS = 3;
const TRACK_WIDTH = 90;
const CAR_LENGTH = 30;
const CAR_WIDTH = 5;
const NUM_RACERS = 5;
const RAY_COUNT = 9;
const RAY_LENGTH = 200;

const COLORS = ['#3399ff', '#ff4444', '#bbbbbb', '#44ff44', '#cc44ff', '#ffaa00'];
const NAMES = ['YOU', 'Red Fury', 'Chrome', 'Green Machine', 'Purple Phantom', 'Gold Rush'];
const SPRITE_FILE_LIST = ['car.png', 'red.png', 'chrome.png', 'green.png', 'purple.png', 'gold.png'];
const COLOR_LABELS = ['Blue', 'Red', 'Chrome', 'Green', 'Purple', 'Gold'];
const TOTAL_RACERS = 6; // 1 player + 5 AI

// Car sprites - one per color, loaded from individual files
const SPRITE_FILES = {
  '#3399ff': 'car.png',
  '#ff4444': 'red.png',
  '#bbbbbb': 'chrome.png',
  '#44ff44': 'green.png',
  '#cc44ff': 'purple.png',
  '#ffaa00': 'gold.png',
};
const carSprites = {};
let spritesLoaded = 0;
for (const [color, file] of Object.entries(SPRITE_FILES)) {
  const img = new Image();
  img.src = file;
  img.onload = function() {
    carSprites[color] = img;
    spritesLoaded++;
  };
}

let track = null;
let racers = [];
let player = null;
let camera = { x: 0, y: 0, zoom: 1.2, shakeX: 0, shakeY: 0, shakeTimer: 0 };
let raceState = 'idle';
let finishOrder = [];
const AUTOPILOT = false;

// ---- Setup state ----
let selectedTrackLength = 'medium';
let selectedCarColorIndex = 0;
let playerUsername = 'Player';

const TRACK_PRESETS = {
  short:  { baseRadiusMin: 500, baseRadiusMax: 700, numPoints: 800 },
  medium: { baseRadiusMin: 900, baseRadiusMax: 1300, numPoints: 1200 },
  long:   { baseRadiusMin: 1400, baseRadiusMax: 1800, numPoints: 1600 },
};

// ---- Screen management ----
function showMainMenu() {
  document.getElementById('main-menu').style.display = 'flex';
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('finish-screen').style.display = 'none';
  document.getElementById('mp-lobby').style.display = 'none';
  document.getElementById('ui').style.display = 'none';
  document.getElementById('lap-info').style.display = 'none';
}

function showComingSoon() {
  const msg = document.getElementById('coming-soon-msg');
  msg.style.display = 'block';
  setTimeout(function() { msg.style.display = 'none'; }, 2000);
}

function showSetup() {
  document.getElementById('main-menu').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
  buildCarPicker();
}

function showMainMenu() {
  document.getElementById('main-menu').style.display = 'flex';
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('finish-screen').style.display = 'none';
  document.getElementById('mp-lobby').style.display = 'none';
  document.getElementById('ui').style.display = 'none';
  document.getElementById('lap-info').style.display = 'none';
}

function selectTrackLength(len, btn) {
  selectedTrackLength = len;
  var btns = document.querySelectorAll('.track-length-btns button');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('selected');
  btn.classList.add('selected');
}

function buildCarPicker() {
  var picker = document.getElementById('car-picker');
  picker.innerHTML = '';
  for (var i = 0; i < COLORS.length; i++) {
    var div = document.createElement('div');
    div.className = 'car-thumb' + (i === selectedCarColorIndex ? ' selected' : '');
    div.setAttribute('data-index', i);
    div.onclick = (function(idx, el) {
      return function() {
        selectedCarColorIndex = idx;
        var all = document.querySelectorAll('.car-thumb');
        for (var j = 0; j < all.length; j++) all[j].classList.remove('selected');
        el.classList.add('selected');
      };
    })(i, div);
    var img = document.createElement('img');
    img.src = SPRITE_FILE_LIST[i];
    img.alt = COLOR_LABELS[i];
    div.appendChild(img);
    var label = document.createElement('span');
    label.className = 'color-label';
    label.textContent = COLOR_LABELS[i];
    div.appendChild(label);
    picker.appendChild(div);
  }
}

function startRaceFromSetup() {
  var input = document.getElementById('username-input');
  playerUsername = (input.value.trim() || 'Player').substring(0, 12);
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('ui').style.display = 'block';
  document.getElementById('lap-info').style.display = 'block';
  startRace();
}

// Engine sound - pitch scales with speed
let audioCtx = null;
let engineSource = null;
let engineBuffer = null;
let engineGain = null;
let engineStarted = false;

// Collision sounds
let scrapeBuffer = null, crash1Buffer = null, crash2Buffer = null;
let scrapeSource = null, scrapeGain = null;
let scraping = false;
let lastCrashTime = 0;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  engineGain = audioCtx.createGain();
  engineGain.connect(audioCtx.destination);
  engineGain.gain.value = 0;
  // Load all sounds
  fetch('engine.mp3').then(r => r.arrayBuffer()).then(buf => audioCtx.decodeAudioData(buf)).then(d => { engineBuffer = d; startEngineLoop(); });
  fetch('scrape.mp3').then(r => r.arrayBuffer()).then(buf => audioCtx.decodeAudioData(buf)).then(d => { scrapeBuffer = d; });
  fetch('crash1.mp3').then(r => r.arrayBuffer()).then(buf => audioCtx.decodeAudioData(buf)).then(d => { crash1Buffer = d; });
  fetch('crash2.mp3').then(r => r.arrayBuffer()).then(buf => audioCtx.decodeAudioData(buf)).then(d => { crash2Buffer = d; });
}

function playCrash() {
  if (!audioCtx || performance.now() - lastCrashTime < 300) return; // debounce
  lastCrashTime = performance.now();
  const buf = Math.random() > 0.5 ? crash1Buffer : crash2Buffer;
  if (!buf) return;
  const src = audioCtx.createBufferSource();
  const gain = audioCtx.createGain();
  src.buffer = buf;
  src.playbackRate.value = 0.9 + Math.random() * 0.3;
  gain.gain.value = 0.5;
  src.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
}

function startScrape() {
  if (scraping || !scrapeBuffer || !audioCtx) return;
  scraping = true;
  scrapeSource = audioCtx.createBufferSource();
  scrapeGain = audioCtx.createGain();
  scrapeSource.buffer = scrapeBuffer;
  scrapeSource.loop = true;
  scrapeSource.playbackRate.value = 2.0;
  scrapeGain.gain.value = 0.9;
  scrapeSource.connect(scrapeGain);
  scrapeGain.connect(audioCtx.destination);
  scrapeSource.start();
}

function stopScrape() {
  if (!scraping) return;
  scraping = false;
  if (scrapeSource) { try { scrapeSource.stop(); } catch(e) {} scrapeSource = null; }
}

function startEngineLoop() {
  if (!engineBuffer || engineStarted) return;
  engineStarted = true;
  engineSource = audioCtx.createBufferSource();
  engineSource.buffer = engineBuffer;
  engineSource.loop = true;
  engineSource.playbackRate.value = 0.4;
  engineSource.connect(engineGain);
  engineSource.start();
}

function updateEngineSound() {
  if (!engineSource || !player) return;
  const effectiveMax = player.maxSpeed * getSpeedMultiplier(player);
  const speedRatio = Math.max(0, player.speed / effectiveMax); // 0-1
  // Playback rate: 0.4 at idle, 1.0 at max speed
  engineSource.playbackRate.value = 0.4 + speedRatio * 0.6;
  // Volume: quiet at low speed, full at high speed
  engineGain.gain.value = 0.15 + speedRatio * 0.55;
}

// Race speed escalation - gets faster as race progresses
function getSpeedMultiplier(r) {
  const totalLapProgress = r.totalProgress / (track ? track.centerline.length : 1);
  const raceProgress = Math.min(1, totalLapProgress / TOTAL_LAPS); // 0 at start, 1 at finish
  return 1 + raceProgress * 0.6; // 1.0x at start, 1.6x at final lap finish
}

// Boost crate system - one at a time on track
let crate = null;
let crateDebris = [];
let crateRespawnTimer = 0;
const BOOST_DURATION = 480; // 8 seconds at 60fps
const BOOST_SPEED_MULT = 1.25;

function spawnCrate() {
  if (!track || crate) return;
  const cl = track.centerline.length;
  // Pick a random spot away from all cars
  const allCars = [player, ...racers].filter(Boolean);
  for (let attempts = 0; attempts < 20; attempts++) {
    const idx = Math.floor(Math.random() * cl);
    const p = track.centerline[idx];
    const n = track.normals[idx];
    const offset = (Math.random() - 0.5) * 20;
    const cx = p.x + n.x * offset;
    const cy = p.y + n.y * offset;
    // Check no car is nearby
    let tooClose = false;
    for (const car of allCars) {
      const d = Math.sqrt((car.x - cx) ** 2 + (car.y - cy) ** 2);
      if (d < 150) { tooClose = true; break; }
    }
    if (!tooClose) {
      crate = { x: cx, y: cy, bob: 0 };
      return;
    }
  }
}

function smashCrate(x, y, carAngle) {
  // Rigid plank pieces that fly out with physics
  const planks = [
    { w: 14, h: 5 }, { w: 12, h: 4 }, { w: 15, h: 3.5 }, { w: 10, h: 5 },
    { w: 11, h: 4 }, { w: 13, h: 3 }, { w: 9, h: 5 }, { w: 14, h: 4 }
  ];
  for (const plank of planks) {
    // Pieces fly forward in car's direction with some spread
    const spreadAngle = carAngle + (Math.random() - 0.5) * 1.2;
    const speed = 3 + Math.random() * 5;
    // Offset slightly behind the impact point
    const offsetX = -Math.cos(carAngle) * 4 + (Math.random() - 0.5) * 6;
    const offsetY = -Math.sin(carAngle) * 4 + (Math.random() - 0.5) * 6;
    crateDebris.push({
      x: x + offsetX,
      y: y + offsetY,
      vx: Math.cos(spreadAngle) * speed,
      vy: Math.sin(spreadAngle) * speed,
      w: plank.w,
      h: plank.h,
      angle: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 0.25,
      life: 180, // 3 seconds
      maxLife: 180,
      grounded: false,
      friction: 0.97 + Math.random() * 0.02
    });
  }
  crate = null;
  crateRespawnTimer = 300;
}

function updateCrate(allCars) {
  // Respawn timer
  if (!crate) {
    crateRespawnTimer--;
    if (crateRespawnTimer <= 0) spawnCrate();
  }
  // Check collision with cars
  if (crate) {
    crate.bob += 0.05;
    for (const car of allCars) {
      const d = Math.sqrt((car.x - crate.x) ** 2 + (car.y - crate.y) ** 2);
      if (d < 18) {
        // Boost this car!
        car.boostTimer = BOOST_DURATION;
        smashCrate(crate.x, crate.y, car.angle);
        break;
      }
    }
  }
  // Update rigid debris planks
  for (let i = crateDebris.length - 1; i >= 0; i--) {
    const d = crateDebris[i];
    d.x += d.vx;
    d.y += d.vy;
    const speed = Math.sqrt(d.vx * d.vx + d.vy * d.vy);
    const fric = speed > 0.5 ? d.friction : 0.9;
    d.vx *= fric;
    d.vy *= fric;
    d.angle += d.spin;
    d.spin *= (speed > 0.3 ? 0.98 : 0.92);
    // Keep debris on track
    if (track) {
      const ci = closestCenterlineIndex(d.x, d.y);
      const cp = track.centerline[ci];
      const cn = track.normals[ci];
      const toDeb = { x: d.x - cp.x, y: d.y - cp.y };
      const dotN = toDeb.x * cn.x + toDeb.y * cn.y;
      const hw = TRACK_WIDTH / 2 - 2;
      if (Math.abs(dotN) > hw) {
        const sign = dotN > 0 ? 1 : -1;
        d.x = cp.x + cn.x * hw * sign;
        d.y = cp.y + cn.y * hw * sign;
        d.vx *= -0.3;
        d.vy *= -0.3;
      }
    }
    d.life--;
    if (d.life <= 0) crateDebris.splice(i, 1);
  }
}

function drawCrate() {
  // Draw rigid plank debris
  for (const d of crateDebris) {
    ctx.save();
    ctx.translate(d.x, d.y);
    ctx.rotate(d.angle);
    // Fade only in last second
    ctx.globalAlpha = d.life < 60 ? d.life / 60 : 1;
    // Wood plank
    ctx.fillStyle = '#a0722a';
    ctx.fillRect(-d.w / 2, -d.h / 2, d.w, d.h);
    // Wood grain line
    ctx.strokeStyle = '#7a5218';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(-d.w / 2 + 1, 0);
    ctx.lineTo(d.w / 2 - 1, 0);
    ctx.stroke();
    // Edge
    ctx.strokeStyle = '#5a3a10';
    ctx.lineWidth = 0.8;
    ctx.strokeRect(-d.w / 2, -d.h / 2, d.w, d.h);
    ctx.globalAlpha = 1;
    ctx.restore();
  }
  // Draw crate
  if (!crate) return;
  const bobY = Math.sin(crate.bob) * 2;
  ctx.save();
  ctx.translate(crate.x, crate.y + bobY);
  // Glow
  ctx.shadowColor = 'rgba(255,200,50,0.6)';
  ctx.shadowBlur = 15;
  // Wooden crate - top-down square
  const s = 10;
  ctx.fillStyle = '#b8862a';
  ctx.fillRect(-s, -s, s * 2, s * 2);
  ctx.strokeStyle = '#6b4c1a';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(-s, -s, s * 2, s * 2);
  // Cross planks
  ctx.beginPath();
  ctx.moveTo(-s, -s); ctx.lineTo(s, s);
  ctx.moveTo(s, -s); ctx.lineTo(-s, s);
  ctx.strokeStyle = '#5a3a10';
  ctx.lineWidth = 1;
  ctx.stroke();
  // Question mark or bolt symbol
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('⚡', 0, 0);
  ctx.shadowBlur = 0;
  ctx.restore();
}

// Particles: sparks, exhaust, tire marks
const particles = [];
const tireMarks = []; // persistent marks on track

function addSparks(x, y, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 15 + Math.random() * 15,
      maxLife: 30,
      type: 'spark',
      size: 1 + Math.random() * 2,
    });
  }
}

function addExhaust(x, y, angle) {
  particles.push({
    x: x - Math.cos(angle) * 12,
    y: y - Math.sin(angle) * 12,
    vx: -Math.cos(angle) * 0.5 + (Math.random() - 0.5) * 0.5,
    vy: -Math.sin(angle) * 0.5 + (Math.random() - 0.5) * 0.5,
    life: 20 + Math.random() * 10,
    maxLife: 30,
    type: 'exhaust',
    size: 2 + Math.random() * 2,
  });
}

function addTireMark(x, y, angle, width) {
  // Two tire lines running ALONG the car's direction
  const perpX = -Math.sin(angle) * width / 2;
  const perpY = Math.cos(angle) * width / 2;
  const dirX = Math.cos(angle) * 3; // short segment along direction
  const dirY = Math.sin(angle) * 3;
  // Left tire
  tireMarks.push({ x1: x + perpX - dirX, y1: y + perpY - dirY, x2: x + perpX + dirX, y2: y + perpY + dirY, alpha: 0.5 });
  // Right tire
  tireMarks.push({ x1: x - perpX - dirX, y1: y - perpY - dirY, x2: x - perpX + dirX, y2: y - perpY + dirY, alpha: 0.5 });
  if (tireMarks.length > 4000) { tireMarks.splice(0, 2); }
}

function shakeCamera(intensity) {
  camera.shakeTimer = Math.max(camera.shakeTimer, 8);
  camera.shakeX = (Math.random() - 0.5) * intensity;
  camera.shakeY = (Math.random() - 0.5) * intensity;
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if (p.type === 'exhaust') {
      p.size *= 1.03;
      p.vx *= 0.95;
      p.vy *= 0.95;
    } else if (p.type === 'fire') {
      p.size *= 0.95;
      p.vx *= 0.92;
      p.vy *= 0.92;
    }
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  // Tire marks (persistent)
  for (let i = tireMarks.length - 1; i >= 0; i--) {
    const m = tireMarks[i];
    m.alpha *= 0.999;
    if (m.alpha < 0.02) { tireMarks.splice(i, 1); continue; }
    ctx.strokeStyle = `rgba(30,30,30,${m.alpha})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(m.x1, m.y1);
    ctx.lineTo(m.x2, m.y2);
    ctx.stroke();
  }

  // Particles
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    if (p.type === 'spark') {
      ctx.fillStyle = `rgba(255,${150 + Math.random() * 105},50,${alpha})`;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    } else if (p.type === 'exhaust') {
      ctx.fillStyle = `rgba(150,150,150,${alpha * 0.3})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.type === 'fire') {
      // Fire: yellow core fading to red/orange
      const r = Math.min(255, 255);
      const g = Math.min(255, Math.floor(200 * alpha));
      const b = Math.floor(50 * alpha);
      ctx.fillStyle = `rgba(${r},${g},${b},${alpha * 0.8})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// Keyboard state
const keys = {};
window.addEventListener('keydown', e => { keys[e.key] = true; keys[e.code] = true; });
window.addEventListener('keyup', e => { keys[e.key] = false; keys[e.code] = false; });

// ---- Track Generation ----

function generateTrack(trackBaseRadius, trackNumPoints, rng) {
  const rand = rng || Math.random;
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const baseRadius = trackBaseRadius || (900 + rand() * 400);
  const numPoints = trackNumPoints || 1200;

  // Use sum of random sine waves for smooth radius variation.
  const numWaves = 4 + Math.floor(rand() * 4); // 4-7 waves
  const waves = [];
  for (let i = 0; i < numWaves; i++) {
    waves.push({
      freq: 2 + Math.floor(rand() * 4),  // 2-5 lobes
      amp: 0.08 + rand() * 0.18,          // 8-26% of base radius
      phase: rand() * Math.PI * 2
    });
  }

  // Generate centerline points directly at fine resolution
  const centerline = [];
  for (let i = 0; i < numPoints; i++) {
    const angle = (i / numPoints) * Math.PI * 2;
    let r = baseRadius;
    for (const w of waves) {
      r += baseRadius * w.amp * Math.sin(angle * w.freq + w.phase);
    }
    // Clamp minimum radius
    r = Math.max(baseRadius * 0.55, r);
    centerline.push({
      x: cx + Math.cos(angle) * r,
      y: cy + Math.sin(angle) * r
    });
  }

  // Smooth centerline and enforce minimum curve radius > track half-width
  const minRadius = TRACK_WIDTH / 2 + 10;
  for (let pass = 0; pass < 5; pass++) {
    const smoothed = [];
    for (let i = 0; i < centerline.length; i++) {
      const prev = centerline[(i - 1 + centerline.length) % centerline.length];
      const cur = centerline[i];
      const next = centerline[(i + 1) % centerline.length];
      const dx1 = cur.x - prev.x, dy1 = cur.y - prev.y;
      const dx2 = next.x - cur.x, dy2 = next.y - cur.y;
      const cross = Math.abs(dx1 * dy2 - dy1 * dx2);
      const segLen = Math.sqrt(dx1 * dx1 + dy1 * dy1) || 1;
      const localRadius = (segLen * segLen) / (cross + 0.001);
      const blend = localRadius < minRadius ? 0.15 : 0.5;
      smoothed.push({
        x: cur.x * blend + (prev.x + next.x) * ((1 - blend) / 2),
        y: cur.y * blend + (prev.y + next.y) * ((1 - blend) / 2)
      });
    }
    for (let i = 0; i < centerline.length; i++) {
      centerline[i] = smoothed[i];
    }
  }

  // Compute normals
  const normals = [];
  for (let i = 0; i < centerline.length; i++) {
    const next = centerline[(i + 1) % centerline.length];
    const prev = centerline[(i - 1 + centerline.length) % centerline.length];
    const dx = next.x - prev.x;
    const dy = next.y - prev.y;
    const len = Math.sqrt(dx * dx + dy * dy) || 1;
    normals.push({ x: -dy / len, y: dx / len });
  }

  // Compute cumulative distances
  const distances = [0];
  for (let i = 1; i < centerline.length; i++) {
    const dx = centerline[i].x - centerline[i - 1].x;
    const dy = centerline[i].y - centerline[i - 1].y;
    distances.push(distances[i - 1] + Math.sqrt(dx * dx + dy * dy));
  }
  const totalLength = distances[distances.length - 1];

  // Build walls
  const hw = TRACK_WIDTH / 2;
  const innerWall = centerline.map((p, i) => ({ x: p.x + normals[i].x * hw, y: p.y + normals[i].y * hw }));
  const outerWall = centerline.map((p, i) => ({ x: p.x - normals[i].x * hw, y: p.y - normals[i].y * hw }));

  const innerSegments = [];
  const outerSegments = [];
  for (let i = 0; i < innerWall.length; i++) {
    const j = (i + 1) % innerWall.length;
    innerSegments.push([innerWall[i], innerWall[j]]);
    outerSegments.push([outerWall[i], outerWall[j]]);
  }

  return { centerline, normals, distances, totalLength, innerWall, outerWall, innerSegments, outerSegments };
}

// ---- Segment intersection ----
function segIntersect(ax, ay, bx, by, cx, cy, dx, dy) {
  const denom = (dx - cx) * (ay - by) - (ax - bx) * (dy - cy);
  if (Math.abs(denom) < 1e-10) return null;
  const t = ((cx - ax) * (ay - by) - (ax - bx) * (cy - ay)) / denom;
  const u = ((dx - cx) * (cy - ay) - (cx - ax) * (dy - cy)) / denom;
  if (t >= 0 && t <= 1 && u >= 0 && u <= 1) {
    return { x: ax + u * (bx - ax), y: ay + u * (by - ay), dist: u };
  }
  return null;
}

// Cast a ray and find closest wall hit
function castRay(ox, oy, angle, maxDist) {
  const ex = ox + Math.cos(angle) * maxDist;
  const ey = oy + Math.sin(angle) * maxDist;
  let closest = maxDist;

  const allSegs = track.innerSegments.concat(track.outerSegments);
  for (const seg of allSegs) {
    const hit = segIntersect(seg[0].x, seg[0].y, seg[1].x, seg[1].y, ox, oy, ex, ey);
    if (hit) {
      const d = hit.dist * maxDist;
      if (d < closest) closest = d;
    }
  }
  return closest;
}

// ---- Find closest centerline index ----
function closestCenterlineIndex(x, y) {
  let best = Infinity, bestIdx = 0;
  for (let i = 0; i < track.centerline.length; i += 3) {
    const dx = track.centerline[i].x - x;
    const dy = track.centerline[i].y - y;
    const d = dx * dx + dy * dy;
    if (d < best) { best = d; bestIdx = i; }
  }
  const lo = Math.max(0, bestIdx - 4);
  const hi = Math.min(track.centerline.length - 1, bestIdx + 4);
  for (let i = lo; i <= hi; i++) {
    const dx = track.centerline[i].x - x;
    const dy = track.centerline[i].y - y;
    const d = dx * dx + dy * dy;
    if (d < best) { best = d; bestIdx = i; }
  }
  return bestIdx;
}

function closestCenterlineIndexNear(x, y, currentIdx) {
  const cl = track.centerline.length;
  const range = 60;
  let best = Infinity, bestIdx = currentIdx;
  for (let offset = -range; offset <= range; offset++) {
    const i = ((currentIdx + offset) % cl + cl) % cl;
    const dx = track.centerline[i].x - x;
    const dy = track.centerline[i].y - y;
    const d = dx * dx + dy * dy;
    if (d < best) { best = d; bestIdx = i; }
  }
  return bestIdx;
}

// ---- Racer (AI Agent) ----

function createRacer(id, startIdx, colorIdx, rng) {
  const rand = rng || Math.random;
  const p = track.centerline[startIdx];
  const next = track.centerline[(startIdx + 1) % track.centerline.length];
  const angle = Math.atan2(next.y - p.y, next.x - p.x);

  const maxSpeed = 5.0;
  const passDesire = 0.5 + rand() * 0.5;
  const lineOffset = (rand() - 0.5) * 0.35;
  const lookAheadBase = 15 + Math.floor(rand() * 25);
  const steerGain = 0.10 + rand() * 0.10;
  const cornerCut = 0.1 + rand() * 0.5;

  return {
    id,
    x: p.x,
    y: p.y,
    angle,
    speed: 0,
    maxSpeed,
    passDesire,
    lineOffset,
    lookAheadBase,
    steerGain,
    cornerCut,
    steerAngle: 0,
    boostTimer: 0,
    lap: 0,
    progress: startIdx,
    totalProgress: 0,
    crossedStart: false,
    finished: false,
    finishTime: 0,
    color: COLORS[colorIdx !== undefined ? colorIdx : id],
    name: NAMES[colorIdx !== undefined ? colorIdx : id],
    rays: new Array(RAY_COUNT).fill(RAY_LENGTH),
    targetSteer: 0,
    stuckTimer: 0,
    lastX: p.x,
    lastY: p.y,
    recoveryTimer: 0,
  };
}

function updateRacer(r, dt, allRacers) {
  if (r.finished) {
    r.speed *= 0.97;
    if (r.speed > 0.5) {
      const ci = closestCenterlineIndexNear(r.x, r.y, r.progress);
      const ahead = (ci + 15) % track.centerline.length;
      const target = track.centerline[ahead];
      const toT = Math.atan2(target.y - r.y, target.x - r.x);
      let diff = toT - r.angle;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      r.angle += diff * 0.1;
      r.progress = ci;
    }
    r.x += Math.cos(r.angle) * r.speed;
    r.y += Math.sin(r.angle) * r.speed;
    return;
  }

  const movedDist = Math.sqrt((r.x - r.lastX) ** 2 + (r.y - r.lastY) ** 2);
  if (movedDist < 0.5) {
    r.stuckTimer += dt;
  } else {
    r.stuckTimer = Math.max(0, r.stuckTimer - dt * 2);
  }
  r.lastX = r.x;
  r.lastY = r.y;

  if (r.stuckTimer > 1500) {
    const ci = closestCenterlineIndex(r.x, r.y);
    const ahead = (ci + 5) % track.centerline.length;
    r.x = track.centerline[ahead].x;
    r.y = track.centerline[ahead].y;
    const next = track.centerline[(ahead + 3) % track.centerline.length];
    r.angle = Math.atan2(next.y - r.y, next.x - r.x);
    r.speed = 2;
    r.stuckTimer = 0;
    r.progress = ahead;
    return;
  }

  const raySpread = Math.PI * 0.8;
  for (let i = 0; i < RAY_COUNT; i++) {
    const frac = (i / (RAY_COUNT - 1)) - 0.5;
    const rayAngle = r.angle + frac * raySpread;
    r.rays[i] = castRay(r.x, r.y, rayAngle, RAY_LENGTH);
  }

  let nearestCarDist = Infinity;
  let nearestCarSide = 0;
  let nearestCarAhead = false;
  for (const other of allRacers) {
    if (other.id === r.id) continue;
    const dx = other.x - r.x;
    const dy = other.y - r.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 200 && dist < nearestCarDist) {
      let relAngle = Math.atan2(dy, dx) - r.angle;
      while (relAngle > Math.PI) relAngle -= Math.PI * 2;
      while (relAngle < -Math.PI) relAngle += Math.PI * 2;
      if (Math.abs(relAngle) < Math.PI * 0.6) {
        nearestCarDist = dist;
        nearestCarSide = relAngle > 0 ? 1 : -1;
        nearestCarAhead = true;
      }
    }
  }

  const cl = track.centerline.length;
  const lookAhead = r.lookAheadBase;
  const curveCheckFar = r.lookAheadBase * 2;
  const targetIdx = (r.progress + lookAhead) % cl;
  const farIdx = (r.progress + curveCheckFar) % cl;
  const curPt = track.centerline[r.progress];
  const aheadPt = track.centerline[targetIdx];
  const farPt = track.centerline[farIdx];

  const dx1 = aheadPt.x - curPt.x, dy1 = aheadPt.y - curPt.y;
  const dx2 = farPt.x - aheadPt.x, dy2 = farPt.y - aheadPt.y;
  const cross = dx1 * dy2 - dy1 * dx2;
  const curvature = Math.max(-1, Math.min(1, cross * 0.003));

  const tNorm = track.normals[targetIdx];
  const insideOffset = -curvature * TRACK_WIDTH * r.cornerCut;
  const personalOffset = r.lineOffset * TRACK_WIDTH;
  let targetX = aheadPt.x + tNorm.x * (insideOffset + personalOffset);
  let targetY = aheadPt.y + tNorm.y * (insideOffset + personalOffset);

  if (nearestCarAhead && nearestCarDist < 150) {
    const leftSpace = (r.rays[0] + r.rays[1] + r.rays[2]) / 3;
    const rightSpace = (r.rays[6] + r.rays[7] + r.rays[8]) / 3;
    const passUrgency = r.passDesire * (1 - nearestCarDist / 150);
    let passOffset = 0;
    if (leftSpace > rightSpace + 5) {
      passOffset = -passUrgency * TRACK_WIDTH * 0.4;
    } else if (rightSpace > leftSpace + 5) {
      passOffset = passUrgency * TRACK_WIDTH * 0.4;
    } else {
      passOffset = -nearestCarSide * passUrgency * TRACK_WIDTH * 0.35;
    }
    targetX += tNorm.x * passOffset;
    targetY += tNorm.y * passOffset;
  }

  const toTarget = Math.atan2(targetY - r.y, targetX - r.x);
  let angleDiff = toTarget - r.angle;
  while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
  while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
  r.steerAngle = angleDiff * r.steerGain;

  const leftMin = Math.min(r.rays[0], r.rays[1]);
  const rightMin = Math.min(r.rays[RAY_COUNT - 1], r.rays[RAY_COUNT - 2]);
  const frontMin = Math.min(r.rays[3], r.rays[4], r.rays[5]);
  if (leftMin < 30) {
    r.steerAngle += (30 - leftMin) / 30 * 0.04;
  }
  if (rightMin < 30) {
    r.steerAngle -= (30 - rightMin) / 30 * 0.04;
  }
  if (frontMin < 30) {
    const leftAvg = (r.rays[0] + r.rays[1] + r.rays[2]) / 3;
    const rightAvg = (r.rays[6] + r.rays[7] + r.rays[8]) / 3;
    r.steerAngle += (rightAvg - leftAvg) * 0.002;
  }

  r.steerAngle = Math.max(-0.2, Math.min(0.2, r.steerAngle));

  const boostMult = r.boostTimer > 0 ? BOOST_SPEED_MULT : 1;
  if (r.boostTimer > 0) r.boostTimer--;
  const targetSpeed = r.maxSpeed * getSpeedMultiplier(r) * boostMult;
  if (r.speed < targetSpeed) {
    r.speed += 0.06;
  } else {
    r.speed = targetSpeed;
  }

  r.angle += r.steerAngle;
  r.x += Math.cos(r.angle) * r.speed;
  r.y += Math.sin(r.angle) * r.speed;

  const ci = closestCenterlineIndexNear(r.x, r.y, r.progress);
  const cp = track.centerline[ci];
  const cn = track.normals[ci];
  const toCar = { x: r.x - cp.x, y: r.y - cp.y };
  const dotN = toCar.x * cn.x + toCar.y * cn.y;
  const hw = TRACK_WIDTH / 2 - CAR_WIDTH;

  if (Math.abs(dotN) > hw * 0.7) {
    const overAmount = (Math.abs(dotN) - hw * 0.7) / (hw * 0.3);
    const pushStrength = overAmount * overAmount * 3.0;
    const sign = dotN > 0 ? 1 : -1;
    r.x -= cn.x * sign * pushStrength;
    r.y -= cn.y * sign * pushStrength;

    const nextCp = track.centerline[(ci + 5) % track.centerline.length];
    const trackDir = Math.atan2(nextCp.y - cp.y, nextCp.x - cp.x);
    let correctionAngle = trackDir - r.angle;
    while (correctionAngle > Math.PI) correctionAngle -= Math.PI * 2;
    while (correctionAngle < -Math.PI) correctionAngle += Math.PI * 2;
    r.angle += correctionAngle * overAmount * 0.15;

    r.speed *= (1 - overAmount * 0.03);

    if (Math.abs(dotN) > hw) {
      r.x = cp.x + cn.x * hw * sign;
      r.y = cp.y + cn.y * hw * sign;
      r.angle += correctionAngle * 0.3;
      r.speed *= 0.95;
      if (r.id === 0) {
        addSparks(r.x, r.y, 6);
        shakeCamera(4);
      }
    }
  }

  for (const other of allRacers) {
    if (other.id === r.id) continue;
    const dx = other.x - r.x;
    const dy = other.y - r.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    // Elliptical collision: longer front/back, shorter sides
    const contactAngle = Math.atan2(dy, dx) - r.angle;
    const sideFactor = Math.abs(Math.sin(contactAngle));
    const colDist = CAR_LENGTH * (1 - sideFactor * 0.6); // full length front/back, 40% on sides
    if (dist < colDist && dist > 0.1) {
      const overlap = colDist - dist;
      const nx = dx / dist;
      const ny = dy / dist;
      r.x -= nx * overlap * 0.5;
      r.y -= ny * overlap * 0.5;
      other.x += nx * overlap * 0.5;
      other.y += ny * overlap * 0.5;
      const pushForce = r.speed * 0.1;
      other.x += Math.cos(r.angle) * pushForce;
      other.y += Math.sin(r.angle) * pushForce;
      const colCx = (r.x + other.x) / 2, colCy = (r.y + other.y) / 2;
      addSparks(colCx, colCy, 3);
      if (r.id === 0 || other.id === 0) { shakeCamera(2); playCrash(); }
    }
  }

  const newProg = closestCenterlineIndexNear(r.x, r.y, r.progress);
  let delta = newProg - r.progress;
  if (delta > cl / 2) delta -= cl;
  if (delta < -cl / 2) delta += cl;
  if (delta > 0 && delta < cl / 4) {
    r.totalProgress += delta;
  }
  r.progress = newProg;

  const lapProgress = r.totalProgress / cl;
  const newLap = Math.floor(lapProgress);
  if (newLap > r.lap) {
    r.lap = newLap;
    if (r.lap >= TOTAL_LAPS && !r.finished) {
      r.finished = true;
      r.finishTime = performance.now();
      finishOrder.push(r);
    }
  }
}

// ---- Rendering ----

function drawTrack() {
  ctx.save();
  ctx.translate(canvas.width / 2, canvas.height / 2);
  ctx.scale(camera.zoom, camera.zoom);
  ctx.translate(-camera.x + camera.shakeX, -camera.y + camera.shakeY);

  // Track surface
  ctx.beginPath();
  ctx.moveTo(track.outerWall[0].x, track.outerWall[0].y);
  for (const p of track.outerWall) ctx.lineTo(p.x, p.y);
  ctx.closePath();
  ctx.moveTo(track.innerWall[0].x, track.innerWall[0].y);
  for (let i = track.innerWall.length - 1; i >= 0; i--) ctx.lineTo(track.innerWall[i].x, track.innerWall[i].y);
  ctx.closePath();
  ctx.fillStyle = '#444';
  ctx.fill();

  // Track borders - red and white curbs
  const curbs = [track.outerWall, track.innerWall];
  for (const wall of curbs) {
    const segLen = 12; // length of each red/white stripe
    for (let i = 0; i < wall.length - 1; i++) {
      const stripe = Math.floor(i / segLen) % 2;
      ctx.beginPath();
      ctx.moveTo(wall[i].x, wall[i].y);
      ctx.lineTo(wall[i + 1].x, wall[i + 1].y);
      ctx.strokeStyle = stripe === 0 ? '#dd2222' : '#ffffff';
      ctx.lineWidth = 4;
      ctx.stroke();
    }
  }

  // Dashed centerline
  ctx.beginPath();
  ctx.setLineDash([15, 15]);
  for (const p of track.centerline) ctx.lineTo(p.x, p.y);
  ctx.closePath();
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.setLineDash([]);

  // Start/finish line
  const sp = track.centerline[0];
  const sn = track.normals[0];
  const hw = TRACK_WIDTH / 2;
  ctx.beginPath();
  ctx.moveTo(sp.x + sn.x * hw, sp.y + sn.y * hw);
  ctx.lineTo(sp.x - sn.x * hw, sp.y - sn.y * hw);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 4;
  ctx.stroke();

  // Checkerboard pattern on start line
  const startDir = { x: -sn.y, y: sn.x };
  for (let i = 0; i < 8; i++) {
    for (let j = 0; j < 2; j++) {
      if ((i + j) % 2 === 0) {
        const size = TRACK_WIDTH / 8;
        const bx = sp.x - sn.x * hw + sn.x * i * size + startDir.x * j * size;
        const by = sp.y - sn.y * hw + sn.y * i * size + startDir.y * j * size;
        ctx.fillStyle = '#fff';
        ctx.fillRect(bx - size / 2, by - size / 2, size, size);
      }
    }
  }

  // Tire marks (under cars)
  drawParticles();
  drawCrate();

  // Draw racers and player
  for (const r of racers) {
    drawCar(r);
  }
  if (player) drawCar(player);

  ctx.restore();
}

function drawCar(r) {
  ctx.save();
  ctx.translate(r.x, r.y);
  ctx.rotate(r.angle);

  const sprite = carSprites[r.color];
  if (sprite) {
    ctx.rotate(Math.PI);
    const h = CAR_LENGTH;
    const w = h * (sprite.width / sprite.height);
    ctx.drawImage(sprite, -w / 2, -h / 2, w, h);
  } else {
    ctx.fillStyle = r.color;
    ctx.beginPath();
    ctx.moveTo(CAR_LENGTH / 2, 0);
    ctx.lineTo(-CAR_LENGTH / 2, -CAR_WIDTH / 2);
    ctx.lineTo(-CAR_LENGTH / 2 + 3, 0);
    ctx.lineTo(-CAR_LENGTH / 2, CAR_WIDTH / 2);
    ctx.closePath();
    ctx.fill();
  }

  ctx.restore();
}

function updatePlayer(r, dt) {
  if (r.finished) {
    r.speed *= 0.97;
    if (r.speed > 0.5) {
      const ci = closestCenterlineIndexNear(r.x, r.y, r.progress);
      const ahead = (ci + 15) % track.centerline.length;
      const target = track.centerline[ahead];
      const toT = Math.atan2(target.y - r.y, target.x - r.x);
      let diff = toT - r.angle;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      r.angle += diff * 0.1;
      r.progress = ci;
    }
    r.x += Math.cos(r.angle) * r.speed;
    r.y += Math.sin(r.angle) * r.speed;
    return;
  }

  // Stuck detection for player too
  const pMovedDist = Math.sqrt((r.x - r.lastX) ** 2 + (r.y - r.lastY) ** 2);
  if (pMovedDist < 0.5) {
    r.stuckTimer += dt;
  } else {
    r.stuckTimer = Math.max(0, r.stuckTimer - dt * 2);
  }
  r.lastX = r.x;
  r.lastY = r.y;
  if (r.stuckTimer > 1000) {
    const ci = closestCenterlineIndex(r.x, r.y);
    const ahead = (ci + 10) % track.centerline.length;
    r.x = track.centerline[ahead].x;
    r.y = track.centerline[ahead].y;
    const next = track.centerline[(ahead + 3) % track.centerline.length];
    r.angle = Math.atan2(next.y - r.y, next.x - r.x);
    r.speed = 2;
    r.stuckTimer = 0;
    r.progress = ahead;
    return;
  }

  if (AUTOPILOT) {
    const lookAhead = 25;
    const targetIdx = (r.progress + lookAhead) % track.centerline.length;
    const target = track.centerline[targetIdx];
    const toTarget = Math.atan2(target.y - r.y, target.x - r.x);
    let angleDiff = toTarget - r.angle;
    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
    r.steerAngle = angleDiff * 0.15;
    r.speed = r.maxSpeed * getSpeedMultiplier(r);
    r.angle += r.steerAngle;
    r.x += Math.cos(r.angle) * r.speed;
    r.y += Math.sin(r.angle) * r.speed;
  } else {
    // Manual control
    const turnRate = 0.045;
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
      r.steerAngle = -turnRate;
    } else if (keys['ArrowRight'] || keys['d'] || keys['D']) {
      r.steerAngle = turnRate;
    } else {
      r.steerAngle *= 0.7;
    }

    if (keys['ArrowUp'] || keys['w'] || keys['W']) {
      r.speed += 0.12;
    } else if (keys['ArrowDown'] || keys['s'] || keys['S']) {
      r.speed -= 0.15;
    } else {
      r.speed *= 0.995;
    }
    const pBoostMult = r.boostTimer > 0 ? BOOST_SPEED_MULT : 1;
    if (r.boostTimer > 0) r.boostTimer--;
    const effectiveMax = r.maxSpeed * getSpeedMultiplier(r) * pBoostMult;
    r.speed = Math.max(0, Math.min(effectiveMax, r.speed));

    r.angle += r.steerAngle * (0.6 + r.speed / effectiveMax * 0.4);
    r.x += Math.cos(r.angle) * r.speed;
    r.y += Math.sin(r.angle) * r.speed;
  }

  // Wall collision
  const ci = closestCenterlineIndexNear(r.x, r.y, r.progress);
  const cp = track.centerline[ci];
  const cn = track.normals[ci];
  const toCar = { x: r.x - cp.x, y: r.y - cp.y };
  const dotN = toCar.x * cn.x + toCar.y * cn.y;
  const hw = TRACK_WIDTH / 2 - CAR_WIDTH;

  if (Math.abs(dotN) > hw * 0.7) {
    const nearness = (Math.abs(dotN) - hw * 0.7) / (hw * 0.3);
    r.speed = Math.max(r.maxSpeed * getSpeedMultiplier(r) * 0.3, r.speed * (1 - nearness * 0.04));
    if (nearness > 0.5) {
      startScrape();
      addSparks(r.x, r.y, 1);
    }
  } else {
    stopScrape();
  }

  if (Math.abs(dotN) > hw) {
    const sign = dotN > 0 ? 1 : -1;
    r.x = cp.x + cn.x * (hw - 3) * sign;
    r.y = cp.y + cn.y * (hw - 3) * sign;
    const vx = Math.cos(r.angle) * r.speed;
    const vy = Math.sin(r.angle) * r.speed;
    const intoWall = (vx * cn.x + vy * cn.y) * sign;
    if (intoWall > 0) {
      const newVx = vx - cn.x * sign * intoWall;
      const newVy = vy - cn.y * sign * intoWall;
      const newSpeed = Math.sqrt(newVx * newVx + newVy * newVy);
      if (newSpeed > 0.1) r.angle = Math.atan2(newVy, newVx);
      r.speed = Math.max(r.maxSpeed * getSpeedMultiplier(r) * 0.3, newSpeed * 0.95);
    }
    addSparks(r.x, r.y, 3);
    shakeCamera(2);
  }

  // Car-car collision with push physics
  for (const other of racers) {
    if (other.id === r.id) continue;
    const dx = other.x - r.x;
    const dy = other.y - r.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const contactAngle = Math.atan2(dy, dx) - r.angle;
    const sideFactor = Math.abs(Math.sin(contactAngle));
    const colDistP = CAR_LENGTH * (1 - sideFactor * 0.6);
    if (dist < colDistP && dist > 0.1) {
      const overlap = colDistP - dist;
      const nx = dx / dist;
      const ny = dy / dist;
      r.x -= nx * overlap * 0.4;
      r.y -= ny * overlap * 0.4;
      other.x += nx * overlap * 0.6;
      other.y += ny * overlap * 0.6;
      const pushForce = r.speed * 0.15;
      other.x += Math.cos(r.angle) * pushForce;
      other.y += Math.sin(r.angle) * pushForce;
      addSparks((r.x + other.x) / 2, (r.y + other.y) / 2, 4);
      shakeCamera(3);
      playCrash();
    }
  }

  // Progress tracking
  const newProg = closestCenterlineIndexNear(r.x, r.y, r.progress);
  const cl = track.centerline.length;
  let delta = newProg - r.progress;
  if (delta > cl / 2) delta -= cl;
  if (delta < -cl / 2) delta += cl;
  if (delta > 0 && delta < cl / 4) {
    r.totalProgress += delta;
  }
  r.progress = newProg;

  const lapProgress = r.totalProgress / cl;
  const newLap = Math.floor(lapProgress);
  if (newLap > r.lap) {
    r.lap = newLap;
    if (r.lap >= TOTAL_LAPS && !r.finished) {
      r.finished = true;
      r.finishTime = performance.now();
      finishOrder.push(r);
    }
  }
}

function updateCamera() {
  if (!player) return;

  const lookAhead = player.speed * 15;
  const targetX = player.x + Math.cos(player.angle) * lookAhead;
  const targetY = player.y + Math.sin(player.angle) * lookAhead;

  camera.x += (targetX - camera.x) * 0.08;
  camera.y += (targetY - camera.y) * 0.08;

  const targetZoom = (player && player.boostTimer > 0) ? 2.0 : 2.5;
  camera.zoom += (targetZoom - camera.zoom) * 0.03;
}

function updateUI() {
  const allCars = player ? [player, ...racers] : [...racers];
  const sorted = allCars.sort((a, b) => {
    if (a.finished && b.finished) return a.finishTime - b.finishTime;
    if (a.finished) return -1;
    if (b.finished) return 1;
    return b.totalProgress - a.totalProgress;
  });

  const posDiv = document.getElementById('positions');
  posDiv.innerHTML = sorted.map((r, i) => {
    const lapDisplay = Math.min(r.lap, TOTAL_LAPS);
    const isPlayer = r.id === 0;
    const posColor = i === 0 ? '#ffd700' : i === 1 ? '#c0c0c0' : i === 2 ? '#cd7f32' : '#666';
    const finished = r.finished ? '<span style="color:#4f4;font-size:10px;margin-left:4px">FIN</span>' : '';
    return `<div class="pos-entry" style="${isPlayer ? 'background:rgba(255,215,0,0.08);' : ''}">
      <span style="color:${posColor};width:18px;font-weight:bold;font-size:14px">${i + 1}</span>
      <span class="color-dot" style="background:${r.color}"></span>
      <span style="color:${isPlayer ? '#fff' : '#bbb'};font-weight:${isPlayer ? '600' : '400'}">${r.name}</span>
      <span style="color:#555;margin-left:auto;font-size:11px">L${lapDisplay}${finished}</span>
    </div>`;
  }).join('');

  const leader = sorted[0];
  document.getElementById('lap-current').textContent = Math.min(leader ? leader.lap + 1 : 1, TOTAL_LAPS);
  document.getElementById('lap-total').textContent = TOTAL_LAPS;

  if (player && track) {
    const mph = Math.round(player.speed * 20);
    const cl = track.centerline.length;
    const pct = Math.max(0, Math.min(100, (player.totalProgress / (cl * TOTAL_LAPS)) * 100)).toFixed(1);
    const lapInfo = document.getElementById('lap-info');
    const currentLap = Math.min(leader ? leader.lap + 1 : 1, TOTAL_LAPS);
    lapInfo.innerHTML = `<div style="color:#ffd700;font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">Lap</div><div style="font-size:28px;font-weight:bold">${currentLap}<span style="color:#555;font-size:16px"> / ${TOTAL_LAPS}</span></div><div style="margin-top:6px;height:3px;background:#333;border-radius:2px;overflow:hidden"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#ffd700,#ff6600);border-radius:2px;transition:width 0.3s"></div></div><div style="color:#777;font-size:10px;margin-top:3px">${pct}%</div>`;
  }
}

// ---- Speedometer Gauge ----

function drawSpeedometer() {
  if (!player) return;
  const mph = Math.round(player.speed * 20);
  const maxMPH = 200;
  const radius = 120;
  const cx = 40 + radius;
  const cy = canvas.height - 40;
  const startAngle = Math.PI;
  const endAngle = Math.PI * 2;

  ctx.save();

  // Dark background
  ctx.beginPath();
  ctx.arc(cx, cy, radius + 10, startAngle, endAngle, false);
  ctx.lineTo(cx + radius + 10, cy + 6);
  ctx.lineTo(cx - radius - 10, cy + 6);
  ctx.closePath();
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fill();

  // Outer ring glow
  ctx.beginPath();
  ctx.arc(cx, cy, radius + 2, startAngle, endAngle, false);
  ctx.strokeStyle = 'rgba(255,60,60,0.15)';
  ctx.lineWidth = 6;
  ctx.stroke();

  // Arc track (grey)
  ctx.beginPath();
  ctx.arc(cx, cy, radius, startAngle, endAngle, false);
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 8;
  ctx.stroke();

  // Colored arc showing current speed
  const speedFraction = Math.min(mph / maxMPH, 1);
  const needleAngle = startAngle + speedFraction * (endAngle - startAngle);
  if (speedFraction > 0) {
    ctx.beginPath();
    ctx.arc(cx, cy, radius, startAngle, needleAngle, false);
    const grad = ctx.createLinearGradient(cx - radius, cy, cx + radius, cy);
    grad.addColorStop(0, '#44ff44');
    grad.addColorStop(0.5, '#ffdd00');
    grad.addColorStop(1, '#ff2222');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 8;
    ctx.stroke();
  }

  // Speed markings
  const marks = [0, 50, 100, 150, 200];
  ctx.fillStyle = '#ccc';
  ctx.font = '11px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (const m of marks) {
    const frac = m / maxMPH;
    const a = startAngle + frac * (endAngle - startAngle);
    // Tick mark
    const innerR = radius - 12;
    const outerR = radius - 2;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * innerR, cy + Math.sin(a) * innerR);
    ctx.lineTo(cx + Math.cos(a) * outerR, cy + Math.sin(a) * outerR);
    ctx.strokeStyle = '#aaa';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Label
    const labelR = radius - 24;
    ctx.fillText(m, cx + Math.cos(a) * labelR, cy + Math.sin(a) * labelR);
  }

  // Minor ticks
  for (let m = 0; m <= maxMPH; m += 10) {
    if (m % 50 === 0) continue;
    const frac = m / maxMPH;
    const a = startAngle + frac * (endAngle - startAngle);
    const innerR = radius - 6;
    const outerR = radius - 2;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * innerR, cy + Math.sin(a) * innerR);
    ctx.lineTo(cx + Math.cos(a) * outerR, cy + Math.sin(a) * outerR);
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Needle
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(needleAngle);
  // Needle glow
  ctx.shadowColor = 'rgba(255,40,40,0.6)';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.moveTo(radius - 18, 0);
  ctx.lineTo(-12, -3);
  ctx.lineTo(-12, 3);
  ctx.closePath();
  ctx.fillStyle = '#ff2222';
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();

  // Center cap
  ctx.beginPath();
  ctx.arc(cx, cy, 8, 0, Math.PI * 2);
  ctx.fillStyle = '#cc0000';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx, cy, 4, 0, Math.PI * 2);
  ctx.fillStyle = '#ff4444';
  ctx.fill();

  // Digital MPH readout
  ctx.font = 'bold 22px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.shadowColor = 'rgba(255,255,255,0.3)';
  ctx.shadowBlur = 6;
  ctx.fillText(mph, cx, cy + 20);
  ctx.shadowBlur = 0;
  ctx.font = '10px "Segoe UI", sans-serif';
  ctx.fillStyle = '#888';
  ctx.fillText('MPH', cx, cy + 34);

  ctx.restore();
}

// ---- Game Loop ----

let lastTime = 0;
function gameLoop(time) {
  const dt = Math.min(32, time - lastTime);
  lastTime = time;

  ctx.fillStyle = track ? '#2d5a1e' : '#1a1a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (track) {
    if (raceState === 'racing') {
      const steps = AUTOPILOT ? 8 : 1;
      for (let s = 0; s < steps; s++) {
        if (player) updatePlayer(player, dt);
        const allCars = [player, ...racers].filter(Boolean);
        for (const r of racers) {
          // In multiplayer, skip updateRacer for remote human players (they're interpolated)
          if (isMultiplayer && r._isRemoteHuman) {
            mpInterpolateRemote(r, dt);
            // Still do progress tracking for remote humans
            if (track) {
              const newProg = closestCenterlineIndexNear(r.x, r.y, r.progress);
              const cl = track.centerline.length;
              let delta = newProg - r.progress;
              if (delta > cl / 2) delta -= cl;
              if (delta < -cl / 2) delta += cl;
              if (delta > 0 && delta < cl / 4) r.totalProgress += delta;
              r.progress = newProg;
              const lapProgress = r.totalProgress / cl;
              const newLap = Math.floor(lapProgress);
              if (newLap > r.lap) {
                r.lap = newLap;
                if (r.lap >= TOTAL_LAPS && !r.finished) {
                  r.finished = true;
                  r.finishTime = performance.now();
                  finishOrder.push(r);
                }
              }
            }
          } else {
            updateRacer(r, dt, allCars);
          }
        }
        if (finishOrder.length >= mpTotalRacers) break;
      }
      // In multiplayer, send local player state to server
      if (isMultiplayer && player && ws && ws.readyState === 1) {
        mpSendInput();
      }
      const allCarsVfx = [player, ...racers].filter(Boolean);
      for (const r of allCarsVfx) {
        if (r.speed > 1) addExhaust(r.x, r.y, r.angle);
        // Boost fire effect
        if (r.boostTimer > 0) {
          for (let f = 0; f < 3; f++) {
            const backX = r.x - Math.cos(r.angle) * 14;
            const backY = r.y - Math.sin(r.angle) * 14;
            particles.push({
              x: backX + (Math.random() - 0.5) * 4,
              y: backY + (Math.random() - 0.5) * 4,
              vx: -Math.cos(r.angle) * (2 + Math.random() * 3) + (Math.random() - 0.5) * 1,
              vy: -Math.sin(r.angle) * (2 + Math.random() * 3) + (Math.random() - 0.5) * 1,
              life: 10 + Math.random() * 10,
              maxLife: 20,
              type: 'fire',
              size: 2 + Math.random() * 3,
            });
          }
          // Subtle continuous shake during boost for player
          if (r.id === 0 && Math.random() < 0.3) {
            camera.shakeTimer = Math.max(camera.shakeTimer, 2);
          }
        }
      }
      // Skid marks - based on actual turning rate (works for player and bots)
      for (const r of allCarsVfx) {
        if (r._prevAngle === undefined) r._prevAngle = r.angle;
        if (r._skidTimer === undefined) r._skidTimer = 0;
        let angleDelta = Math.abs(r.angle - r._prevAngle);
        if (angleDelta > Math.PI) angleDelta = Math.PI * 2 - angleDelta;
        r._prevAngle = r.angle;
        // Skid when turning sharply at speed
        if (angleDelta > 0.35 && r.speed > 3) {
          r._skidTimer = 30; // half-second minimum
        }
        if (r._skidTimer > 0) {
          addTireMark(r.x, r.y, r.angle, CAR_WIDTH * 0.8);
          r._skidTimer--;
        }
      }
      // Update cones
      const allCarsForCrate = [player, ...racers].filter(Boolean);
      updateCrate(allCarsForCrate);
      updateParticles();

      if (finishOrder.length >= mpTotalRacers) {
        raceState = 'finished';
        showFinish();
      }
    }
    if (camera.shakeTimer > 0) {
      camera.shakeTimer--;
      camera.shakeX = (Math.random() - 0.5) * camera.shakeTimer * 0.8;
      camera.shakeY = (Math.random() - 0.5) * camera.shakeTimer * 0.8;
    } else {
      camera.shakeX = 0;
      camera.shakeY = 0;
    }
    updateCamera();
    updateEngineSound();
    drawTrack();
    drawSpeedometer();
    updateUI();
  }

  requestAnimationFrame(gameLoop);
}

let testRaceCount = 0;
const testResults = [];
function showFinish() {

    return `<div style="color:${r.color}">${medal} ${i + 1}. ${r.name}</div>`;
  }).join('');

  if (AUTOPILOT) {

    testResults.push({ race: testRaceCount, winner: finishOrder[0].name, playerPos });
    console.log(`--- RACE ${testRaceCount} ---`);
    finishOrder.forEach((r, i) => {
      console.log(`  ${i+1}. ${r.name} (maxSpeed=${r.maxSpeed})`);
    });
    console.log(`  Player finished: ${playerPos}${playerPos === 1 ? 'st' : playerPos === 2 ? 'nd' : playerPos === 3 ? 'rd' : 'th'}`);

    if (testRaceCount >= 10) {
      const playerWins = testResults.filter(r => r.playerPos === 1).length;
      const avgPos = testResults.reduce((s, r) => s + r.playerPos, 0) / testRaceCount;
      const winCounts = {};
      testResults.forEach(r => { winCounts[r.winner] = (winCounts[r.winner] || 0) + 1; });
      let summaryHTML = `<h2 style="color:#ffd700">TEST RESULTS (${testRaceCount} races)</h2>`;
      summaryHTML += `<div style="font-size:18px;line-height:2;text-align:left">`;
      summaryHTML += `<div>Autopilot (centerline) wins: <b>${playerWins}/${testRaceCount}</b></div>`;
      summaryHTML += `<div>Autopilot avg position: <b>${avgPos.toFixed(1)}</b></div>`;
      summaryHTML += `<br><div style="color:#aaa">Race-by-race:</div>`;
      testResults.forEach(r => {
        const color = r.playerPos === 1 ? '#4f4' : r.playerPos <= 3 ? '#ff4' : '#f44';
        summaryHTML += `<div>Race ${r.race}: Winner=<b>${r.winner}</b>, Player=<span style="color:${color}">${r.playerPos}${['st','nd','rd'][r.playerPos-1]||'th'}</span></div>`;
      });
      summaryHTML += `<br><div style="color:#aaa">Win counts:</div>`;
      Object.entries(winCounts).sort((a,b) => b[1]-a[1]).forEach(([name, count]) => {
        summaryHTML += `<div>${name}: ${count} wins</div>`;
      });
      summaryHTML += `</div>`;
      results.innerHTML = summaryHTML;
      screen.style.display = 'flex';
      return;
    }
    setTimeout(() => startRace(true), 200);
    return;
  }

  screen.style.display = 'flex';
}

function initTrackAndRacers(rng) {
  // Get track preset
  const preset = TRACK_PRESETS[selectedTrackLength] || TRACK_PRESETS.medium;
  const rand = rng || Math.random;
  const trackRadius = preset.baseRadiusMin + rand() * (preset.baseRadiusMax - preset.baseRadiusMin);
  track = generateTrack(trackRadius, preset.numPoints, rng);
  racers = [];
  finishOrder = [];

  // Build color/name assignment based on player's chosen color
  // Player gets selectedCarColorIndex; AI gets the rest in original order
  var playerColorIdx = selectedCarColorIndex;
  var aiColorIndices = [];
  for (var ci = 0; ci < COLORS.length; ci++) {
    if (ci !== playerColorIdx) aiColorIndices.push(ci);
  }

  // Create all 6 cars with shuffled grid positions
  const gridOrder = [0, 1, 2, 3, 4, 5];
  for (let i = gridOrder.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [gridOrder[i], gridOrder[j]] = [gridOrder[j], gridOrder[i]];
  }

  var aiIdx = 0;
  for (let i = 0; i < TOTAL_RACERS; i++) {
    const gridPos = gridOrder[i];
    const startIdx = track.centerline.length - (gridPos * 3 + 3);
    const idx = ((startIdx % track.centerline.length) + track.centerline.length) % track.centerline.length;

    if (i === 0) {
      // Player car
      const racer = createRacer(i, idx, playerColorIdx, rng);
      racer.name = playerUsername;
      racer.maxSpeed = 5.0;
      const n = track.normals[idx];
      const offset = (gridPos % 2 === 0 ? 1 : -1) * (10 + (gridPos % 3) * 8);
      racer.x += n.x * offset;
      racer.y += n.y * offset;
      player = racer;
    } else {
      // AI car - assign from remaining colors
      const colorIdx = aiColorIndices[aiIdx];
      aiIdx++;
      const racer = createRacer(i, idx, colorIdx, rng);
      const n = track.normals[idx];
      const offset = (gridPos % 2 === 0 ? 1 : -1) * (10 + (gridPos % 3) * 8);
      racer.x += n.x * offset;
      racer.y += n.y * offset;
      racers.push(racer);
    }
  }

  // Initialize totalProgress
  const allInit = [player, ...racers];
  const cl = track.centerline.length;
  for (const c of allInit) {
    c.totalProgress = -(cl - c.progress);
  }

  camera.x = player.x;
  camera.y = player.y;
  crate = null; crateDebris = []; crateRespawnTimer = 120;
}

function startRace(isAutoRestart) {
  document.getElementById('main-menu').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('finish-screen').style.display = 'none';
  document.getElementById('ui').style.display = 'block';

    testResults.length = 0;
  }
  initTrackAndRacers();

  // Countdown
  raceState = 'countdown';
  const cdEl = document.getElementById('countdown');
  cdEl.style.display = 'block';

  if (AUTOPILOT && testRaceCount > 0) {
    cdEl.style.display = 'none';
    raceState = 'racing';

  } else {
    let count = 3;
    cdEl.textContent = count;

        cdEl.textContent = 'GO!';
      } else {
        cdEl.style.display = 'none';
        raceState = 'racing';
        initAudio();
        clearInterval(interval);
      }

  }
}

// ---- Seeded PRNG (Mulberry32) ----
function createRNG(seed) {
  var s = seed | 0;
  return function() {
    s = (s + 0x6D2B79F5) | 0;
    var t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ---- WebSocket Connection ----

function connectToServer(url) {
  return new Promise(function(resolve, reject) {
    try {
      ws = new WebSocket(url);
    } catch (e) {
      reject(e);
      return;
    }
    ws.onopen = function() { resolve(); };
    ws.onerror = function() { reject(new Error('Connection failed')); };
    ws.onclose = function() {
      if (isMultiplayer && raceState === 'racing') {
        // Disconnected during race
        isMultiplayer = false;
        document.getElementById('mp-error').textContent = 'Disconnected from server';
      }
      ws = null;
    };
    ws.onmessage = function(event) {
      var msg;
      try { msg = JSON.parse(event.data); } catch(e) { return; }
      mpHandleMessage(msg);
    };
  });
}

function mpHandleMessage(msg) {
  switch (msg.type) {
    case 'room_created':
      myPlayerId = msg.you;
      mpRoomCode = msg.roomCode;
      mpIsHost = true;
      mpPlayers = msg.players;
      document.getElementById('mp-room-code-display').textContent = msg.roomCode;
      mpShowWaiting();
      mpUpdatePlayerList();
      break;

    case 'room_joined':
      myPlayerId = msg.you;
      mpRoomCode = msg.roomCode;
      mpIsHost = false;
      mpPlayers = msg.players;
      selectedTrackLength = msg.trackLength || 'medium';
      document.getElementById('mp-room-code-display').textContent = msg.roomCode;
      mpShowWaiting();
      mpUpdatePlayerList();
      break;

    case 'player_joined':
      mpPlayers = msg.players;
      mpUpdatePlayerList();
      break;

    case 'player_update':
      mpPlayers = msg.players;
      mpUpdatePlayerList();
      break;

    case 'player_left':
      mpPlayers = msg.players;
      mpUpdatePlayerList();
      break;

    case 'error':
      document.getElementById('mp-error').textContent = msg.message;
      break;

    case 'game_starting':
      mpStartMultiplayerRace(msg);
      break;

    case 'countdown':
      mpShowCountdown(msg.value);
      break;

    case 'race_start':
      raceState = 'racing';
      initAudio();
      var cdOverlay = document.getElementById('mp-countdown-overlay');
      cdOverlay.textContent = 'GO!';
      setTimeout(function() { cdOverlay.style.display = 'none'; }, 600);
      break;

    case 'state':
      mpHandleStateUpdate(msg.players);
      break;
  }
}

// ---- Start Multiplayer Race ----

function mpStartMultiplayerRace(msg) {
  isMultiplayer = true;
  document.getElementById('mp-lobby').style.display = 'none';
  document.getElementById('ui').style.display = 'block';
  document.getElementById('lap-info').style.display = 'block';

  // Generate track from seed
  selectedTrackLength = msg.trackLength || selectedTrackLength;
  var rng = createRNG(msg.seed);
  var preset = TRACK_PRESETS[selectedTrackLength] || TRACK_PRESETS.medium;
  var trackRadius = preset.baseRadiusMin + rng() * (preset.baseRadiusMax - preset.baseRadiusMin);
  track = generateTrack(trackRadius, preset.numPoints, rng);

  racers = [];
  finishOrder = [];
  mpRemotePlayers = {};

  var allPlayers = msg.players; // [{id, username, color, isAI}]
  mpTotalRacers = allPlayers.length;

  // Grid positions - use seeded rng for deterministic order
  var gridOrder = [];
  for (var gi = 0; gi < allPlayers.length; gi++) gridOrder.push(gi);
  for (var gi2 = gridOrder.length - 1; gi2 > 0; gi2--) {
    var gj = Math.floor(rng() * (gi2 + 1));
    var tmp = gridOrder[gi2]; gridOrder[gi2] = gridOrder[gj]; gridOrder[gj] = tmp;
  }

  player = null;
  for (var pi = 0; pi < allPlayers.length; pi++) {
    var pInfo = allPlayers[pi];
    var gridPos = gridOrder[pi];
    var startIdx = track.centerline.length - (gridPos * 3 + 3);
    startIdx = ((startIdx % track.centerline.length) + track.centerline.length) % track.centerline.length;

    var colorIdx = COLORS.indexOf(pInfo.color);
    if (colorIdx === -1) colorIdx = pi;
    var racer = createRacer(pi, startIdx, colorIdx, rng);
    racer.name = pInfo.username;
    racer.mpId = pInfo.id; // server-assigned player id
    racer._isRemoteHuman = false;
    racer._isAI = !!pInfo.isAI;

    var n = track.normals[startIdx];
    var offset = (gridPos % 2 === 0 ? 1 : -1) * (10 + (gridPos % 3) * 8);
    racer.x += n.x * offset;
    racer.y += n.y * offset;

    if (pInfo.id === myPlayerId) {
      // This is us - the local player
      player = racer;
      racer._isRemoteHuman = false;
    } else if (!pInfo.isAI) {
      // Remote human player
      racer._isRemoteHuman = true;
      mpRemotePlayers[pInfo.id] = { targetX: racer.x, targetY: racer.y, targetAngle: racer.angle, targetSpeed: racer.speed };
      racers.push(racer);
    } else {
      // AI bot - runs locally
      racer._isRemoteHuman = false;
      racers.push(racer);
    }
  }

  // Initialize totalProgress
  var allInit = [player].concat(racers).filter(Boolean);
  var cl = track.centerline.length;
  for (var ti = 0; ti < allInit.length; ti++) {
    allInit[ti].totalProgress = -(cl - allInit[ti].progress);
  }

  if (player) {
    camera.x = player.x;
    camera.y = player.y;
  }

  raceState = 'countdown';
  var cdOverlay = document.getElementById('mp-countdown-overlay');
  cdOverlay.style.display = 'block';
  cdOverlay.textContent = '';
}

function mpShowCountdown(value) {
  var cdOverlay = document.getElementById('mp-countdown-overlay');
  cdOverlay.style.display = 'block';
  cdOverlay.textContent = value > 0 ? value : 'GO!';
}

// ---- Network: Send Input ----

function mpSendInput() {
  if (!ws || ws.readyState !== 1 || !player) return;
  // Throttle sending to ~20Hz (every 50ms)
  var now = performance.now();
  if (now - mpSendTimer < 45) return;
  mpSendTimer = now;

  var steering = 0, throttle = 0, brake = 0;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) steering = -1;
  else if (keys['ArrowRight'] || keys['d'] || keys['D']) steering = 1;
  if (keys['ArrowUp'] || keys['w'] || keys['W']) throttle = 1;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) brake = 1;

  ws.send(JSON.stringify({
    type: 'input',
    steering: steering,
    throttle: throttle,
    brake: brake,
    x: player.x,
    y: player.y,
    angle: player.angle,
    speed: player.speed,
    lap: player.lap,
    progress: player.progress
  }));
}

// ---- Network: Handle State Updates ----

function mpHandleStateUpdate(remotePlayers) {
  if (!racers || !track) return;
  for (var si = 0; si < remotePlayers.length; si++) {
    var rp = remotePlayers[si];
    if (rp.id === myPlayerId) continue; // Skip our own data

    // Find the matching racer
    for (var ri = 0; ri < racers.length; ri++) {
      if (racers[ri].mpId === rp.id && racers[ri]._isRemoteHuman) {
        var target = mpRemotePlayers[rp.id];
        if (target) {
          target.targetX = rp.x;
          target.targetY = rp.y;
          target.targetAngle = rp.angle;
          target.targetSpeed = rp.speed;
        }
        // Update lap/progress directly
        if (rp.lap !== undefined) racers[ri].lap = rp.lap;
        break;
      }
    }
  }
}

// ---- Network: Interpolate Remote Players ----

function mpInterpolateRemote(r, dt) {
  var target = mpRemotePlayers[r.mpId];
  if (!target) return;
  var lerpRate = 0.2;
  r.x += (target.targetX - r.x) * lerpRate;
  r.y += (target.targetY - r.y) * lerpRate;

  // Angle interpolation (handle wrapping)
  var angleDiff = target.targetAngle - r.angle;
  while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
  while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
  r.angle += angleDiff * lerpRate;

  r.speed += (target.targetSpeed - r.speed) * lerpRate;

  // Move car forward based on interpolated speed
  r.x += Math.cos(r.angle) * r.speed * 0.1;
  r.y += Math.sin(r.angle) * r.speed * 0.1;
}

// ---- Multiplayer Reset ----

function resetRaceMP() {
  if (ws) { ws.close(); ws = null; }
  isMultiplayer = false;
  myPlayerId = null;
  mpPlayers = [];
  mpRemotePlayers = {};
  mpRoomCode = null;
  mpIsHost = false;
  mpTotalRacers = TOTAL_RACERS;
}

// Catch runtime errors
window.onerror = function(msg, url, line) { document.title = 'ERR L' + line + ': ' + msg; };
</script>
